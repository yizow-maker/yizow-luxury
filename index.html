<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Yizow Luxury | Premium Store</title>
                <style>
                        :root { --gold: #D4AF37; --dark: #0a0a0a; --white: #ffffff; --grey: #222; }
                                body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: var(--white); margin: 0; }

                                                header { background: #111; padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }

                                                                /* Countdown Style */
                                                                        .promo-banner { background: var(--gold); color: black; text-align: center; padding: 8px; font-weight: bold; font-size: 14px; }

                                                                                .search-container { padding: 15px; text-align: center; }
                                                                                        #searchBar { width: 90%; max-width: 500px; padding: 12px; border-radius: 25px; border: 1px solid var(--gold); background: #111; color: white; outline: none; }

                                                                                                /* Product Grid */
                                                                                                        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
                                                                                                                .item { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.4s ease; }
                                                                                                                        .item:hover { transform: scale(1.02); border-color: var(--gold); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); }
                                                                                                                                .item img { width: 100%; height: 220px; object-fit: cover; cursor: pointer; transition: 0.5s; }
                                                                                                                                        .item:hover img { filter: brightness(1.1); }

                                                                                                                                                        .details { padding: 12px; text-align: center; }
                                                                                                                                                                .price { color: var(--gold); font-weight: bold; font-size: 18px; display: block; margin-bottom: 8px; }

                                                                                                                                                                                /* Buttons */
                                                                                                                                                                                        .btn-wa { background: #25D366; color: white; padding: 10px; text-decoration: none; display: block; border-radius: 8px; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
                                                                                                                                                                                                .btn-call { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 8px; text-decoration: none; display: block; border-radius: 8px; font-size: 12px; }

                                                                                                                                                                                                        /* Modal Preview */
                                                                                                                                                                                                                #imgModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
                                                                                                                                                                                                                        #imgModal img { max-width: 90%; max-height: 85%; border-radius: 10px; border: 2px solid var(--gold); animation: zoomIn 0.3s; }
                                                                                                                                                                                                                                @keyframes zoomIn { from {transform: scale(0.7);} to {transform: scale(1);} }
                                                                                                                                                                                                                                        .close-modal { position: absolute; top: 20px; right: 30px; font-size: 45px; color: white; cursor: pointer; }

                                                                                                                                                                                                                                                footer { text-align: center; padding: 40px; color: #555; font-size: 12px; }
                                                                                                                                                                                                                                                    </style>
                                                                                                                                                                                                                                                    </head>
                                                                                                                                                                                                                                                    <body onload="loadProducts()">

                                                                                                                                                                                                                                                        <div class="promo-banner" id="countdown">OFFA ITAISHA BAADA YA: 00:00:00</div>

                                                                                                                                                                                                                                                            <header>
                                                                                                                                                                                                                                                                    <h1 style="color: var(--gold); margin: 0; letter-spacing: 2px;">YIZOW LUXURY</h1>
                                                                                                                                                                                                                                                                        </header>

                                                                                                                                                                                                                                                                            <div class="search-container">
                                                                                                                                                                                                                                                                                    <input type="text" id="searchBar" placeholder="Tafuta nguo, raba, au saa..." onkeyup="searchProduct()">
                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                            <div class="grid" id="product-grid"></div>

                                                                                                                                                                                                                                                                                                <div id="imgModal" onclick="closePreview()">
                                                                                                                                                                                                                                                                                                        <span class="close-modal">&times;</span>
                                                                                                                                                                                                                                                                                                                <img id="previewImg" src="">
                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                        <footer>&copy; 2026 Yizow Luxury Store | Arusha, Tanzania</footer>

                                                                                                                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                                                                                                                            const myNumber = "255693664088";
                                                                                                                                                                                                                                                                                                                                const images = [
                                                                                                                                                                                                                                                                                                                                	        'IMG-20260421-WA0003.jpg', 'IMG-20260421-WA0004.jpg', 'IMG-20260421-WA0044.jpg',
                                                                                                                                                                                                                                                                                                                                	                'IMG-20260421-WA0045.jpg', 'IMG-20260426-WA0009.jpg', 'IMG-20260426-WA0010.jpg',
                                                                                                                                                                                                                                                                                                                                	                        'IMG-20260426-WA0011.jpg', 'IMG-20260426-WA0012.jpg', 'IMG-20260426-WA0013.jpg',
                                                                                                                                                                                                                                                                                                                                	                                'IMG-20260428-WA0028.jpg', 'IMG-20260428-WA0029.jpg', 'IMG-20260428-WA0030.jpg',
                                                                                                                                                                                                                                                                                                                                	                                        'IMG-20260428-WA0031.jpg', 'IMG-20260429-WA0004.jpg', 'IMG-20260429-WA0005.jpg',
                                                                                                                                                                                                                                                                                                                                	                                                'IMG-20260429-WA0006.jpg', 'IMG-20260429-WA0007.jpg', 'IMG-20260429-WA0008.jpg',
                                                                                                                                                                                                                                                                                                                                	                                                        'IMG-20260429-WA0009.jpg', 'IMG-20260429-WA0010.jpg', 'IMG-20260429-WA0011.jpg',
                                                                                                                                                                                                                                                                                                                                	                                                                'IMG-20260429-WA0012.jpg', 'IMG-20260429-WA0017.jpg', 'IMG-20260429-WA0018.jpg',
                                                                                                                                                                                                                                                                                                                                	                                                                        'IMG-20260429-WA0019.jpg', 'IMG-20260429-WA0020.jpg', 'IMG-20260429-WA0021.jpg',
                                                                                                                                                                                                                                                                                                                                	                                                                                'IMG-20260429-WA0022.jpg', 'IMG-20260429-WA0023.jpg', 'IMG-20260429-WA0049.jpg',
                                                                                                                                                                                                                                                                                                                                	                                                                                        'IMG-20260429-WA0051.jpg', 'IMG-20260430-WA0023.jpg'
                                                                                                                                                                                                                                                                                                                                	                                                                                            ];

                                                                                                                                                                                                                                                                                                                                	                                                                                                function loadProducts() {
                                                                                                                                                                                                                                                                                                                                	                                                                                                	        const grid = document.getElementById('product-grid');
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                grid.innerHTML = images.map(img => `
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                            <div class="item">
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                            <img src="${img}" onclick="openPreview('${img}')" alt="Luxury Item">
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                            <div class="details">
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                <span class="price">Tsh 45,000</span>
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                    <a href="https://wa.me/${myNumber}?text=Habari Yizow Luxury, nahitaji bidhaa hii: ${img}" class="btn-wa">AGIZA WHATSAPP</a>
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                        <a href="tel:+${myNumber}" class="btn-call">PIGA SIMU</a>
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                            `).join('');
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                    startTimer();
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            function searchProduct() {
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	        let input = document.getElementById('searchBar').value.toLowerCase();
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                let items = document.getElementsByClassName('item');
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        for (let i = 0; i < items.length; i++) {
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            if (!images[i].toLowerCase().includes(input)) {
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                items[i].style.display = "none";
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            } else {
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                items[i].style.display = "block";
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                            }
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                    }
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                        }

                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            function openPreview(src) {
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	        document.getElementById('previewImg').src = src;
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                document.getElementById('imgModal').style.display = 'flex';
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                    }

                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        function closePreview() {
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	        document.getElementById('imgModal').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	            }

                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                // Timer ya Ofa (Saa 24)
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    function startTimer() {
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    	        let time = 24 * 60 * 60; 
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    	                const display = document.getElementById('countdown');
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    	                        setInterval(() => {
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    	                        	            let hours = Math.floor(time / 3600);
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    	                        	                        let mins = Math.floor((time % 3600) / 60);
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    	                        	                                    let secs = time % 60;
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    	                        	                                                display.innerHTML = `OFFA ITAISHA BAADA YA: ${hours}h ${mins}m ${secs}s`;
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    	                        	                                                            time--;
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    	                        	                                                                    }, 1000);
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    	                        	                                                                        }
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    	                        	                                                                        </script>
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    	                        	                                                                        </body>
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    	                        	                                                                        </html>
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    	                        	                                                                        
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    	                        })
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        	                    }
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            	                        }
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            	                                            }
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            	                            }
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        	            }
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            	                        }
                                                                                                                                                                                                                                                                                                                                	                                                                                                	                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                	                                                                                                }
                                                                                                                                                                                                                                                                                                                                ]
