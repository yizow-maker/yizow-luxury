                                        header { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('IMG-20260430-WA0023.jpg'); background-size: cover; background-position: center; height: 200px; display: flex; flex-direction: column; justify-content: center; text-align: center; border-bottom: 2px solid var(--gold); }
