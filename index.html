<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Yizow Luxury | Premium Store</title>
                <style>
                        :root { --gold: #D4AF37; --dark: #0a0a0a; --white: #ffffff; --grey: #222; }
                                body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: var(--white); margin: 0; }

                                                /* 1. Login Screen */
                                                        #login-screen { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 1000; }
                                                                .login-box { background: #111; padding: 30px; border-radius: 15px; border: 1px solid var(--gold); text-align: center; width: 85%; max-width: 350px; }
                                                                        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--grey); background: #000; color: white; box-sizing: border-box; }
                                                                                .btn-gold { background: var(--gold); color: black; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

                                                                                        /* 2. Main Content */
                                                                                                #main-content { display: none; }
                                                                                                        header { background: #111; padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
                                                                                                                .search-container { padding: 15px; text-align: center; }
                                                                                                                        #searchBar { width: 90%; max-width: 500px; padding: 12px; border-radius: 25px; border: 1px solid var(--gold); background: #111; color: white; }

                                                                                                                                /* 3. Product Grid */
                                                                                                                                        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
                                                                                                                                                .item { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
                                                                                                                                                        .item img { width: 100%; height: 200px; object-fit: cover; cursor: pointer; }
                                                                                                                                                                .details { padding: 12px; text-align: center; }
                                                                                                                                                                        .price { color: var(--gold); font-weight: bold; font-size: 18px; display: block; margin-bottom: 8px; }

                                                                                                                                                                                        /* 4. Image Preview Modal */
                                                                                                                                                                                                #imgModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
                                                                                                                                                                                                        #imgModal img { max-width: 95%; max-height: 80%; border-radius: 10px; border: 2px solid var(--gold); }
                                                                                                                                                                                                                .close-modal { position: absolute; top: 20px; right: 30px; font-size: 40px; color: white; cursor: pointer; }

                                                                                                                                                                                                                        footer { text-align: center; padding: 30px; color: #555; font-size: 12px; }
                                                                                                                                                                                                                            </style>
                                                                                                                                                                                                                            </head>
                                                                                                                                                                                                                            <body>

                                                                                                                                                                                                                                <div id="login-screen">
                                                                                                                                                                                                                                        <div class="login-box">
                                                                                                                                                                                                                                                    <h2 style="color: var(--gold); margin-bottom: 5px;">YIZOW LUXURY</h2>
                                                                                                                                                                                                                                                                <p style="font-size: 13px; color: #888;">Ingiza siri kuingia hekaluni</p>
                                                                                                                                                                                                                                                                            <input type="password" id="passInput" placeholder="Password ya Duka">
                                                                                                                                                                                                                                                                                        <button class="btn-gold" onclick="verify()">FUNGUA DUKA</button>
                                                                                                                                                                                                                                                                                                    <p id="errMsg" style="color: red; font-size: 12px; display: none; margin-top: 10px;">Password si sahihi!</p>
                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                    <div id="main-content">
                                                                                                                                                                                                                                                                                                                            <header>
                                                                                                                                                                                                                                                                                                                                        <h1 style="color: var(--gold); margin: 0; letter-spacing: 2px;">YIZOW LUXURY</h1>
                                                                                                                                                                                                                                                                                                                                                </header>

                                                                                                                                                                                                                                                                                                                                                        <div class="search-container">
                                                                                                                                                                                                                                                                                                                                                                    <input type="text" id="searchBar" placeholder="Tafuta nguo unayotaka..." onkeyup="searchProduct()">
                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                    <div class="grid" id="product-grid">
                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                        <footer>&copy; 2026 Yizow Luxury Store. Designed by Yizow Maker.</footer>
                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                <div id="imgModal">
                                                                                                                                                                                                                                                                                                                                                                                                                        <span class="close-modal" onclick="closePreview()">&times;</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                <img id="previewImg" src="">
                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                    <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                        const pass = "2026"; // Password yako
                                                                                                                                                                                                                                                                                                                                                                                                                                            const myNumber = "255693664088";

                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Orodha ya picha zako (Nimeziweka zote ulizotuma)
                                                                                                                                                                                                                                                                                                                                                                                                                                                        const images = [
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	        'IMG-20260421-WA0003.jpg', 'IMG-20260421-WA0004.jpg', 'IMG-20260421-WA0044.jpg',
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                'IMG-20260421-WA0045.jpg', 'IMG-20260426-WA0009.jpg', 'IMG-20260426-WA0010.jpg',
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                        'IMG-20260426-WA0011.jpg', 'IMG-20260426-WA0012.jpg', 'IMG-20260426-WA0013.jpg',
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                'IMG-20260428-WA0028.jpg', 'IMG-20260428-WA0029.jpg', 'IMG-20260428-WA0030.jpg',
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                        'IMG-20260428-WA0031.jpg', 'IMG-20260429-WA0004.jpg', 'IMG-20260429-WA0005.jpg',
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                'IMG-20260429-WA0006.jpg', 'IMG-20260429-WA0007.jpg', 'IMG-20260429-WA0008.jpg',
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                        'IMG-20260429-WA0009.jpg', 'IMG-20260429-WA0010.jpg', 'IMG-20260429-WA0011.jpg',
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                'IMG-20260429-WA0012.jpg', 'IMG-20260429-WA0017.jpg', 'IMG-20260429-WA0018.jpg',
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                        'IMG-20260429-WA0019.jpg', 'IMG-20260429-WA0020.jpg', 'IMG-20260429-WA0021.jpg',
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                'IMG-20260429-WA0022.jpg', 'IMG-20260429-WA0023.jpg', 'IMG-20260429-WA0049.jpg',
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                        'IMG-20260429-WA0051.jpg', 'IMG-20260430-WA0023.jpg'
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                            ];

                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                function verify() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	        const input = document.getElementById('passInput').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                if(input === pass) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	            document.getElementById('login-screen').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                        document.getElementById('main-content').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                    loadProducts();
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	            document.getElementById('errMsg').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            function loadProducts() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	        const grid = document.getElementById('product-grid');
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                grid.innerHTML = images.map(img => `
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                            <div class="item">
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                            <img src="${img}" onclick="openPreview('${img}')" alt="Luxury Wear">
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                            <div class="details">
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                <span class="price">Tsh 45,000</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                    <a href="https://wa.me/${myNumber}?text=Habari Yizow Luxury, nahitaji nguo hii: ${img}" class="btn-gold" style="text-decoration:none; display:block; padding:8px; font-size:12px;">AGIZA WHATSAPP</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                        `).join('');
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                function searchProduct() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	        let input = document.getElementById('searchBar').value.toLowerCase();
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                let items = document.getElementsByClassName('item');
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        for (let i = 0; i < items.length; i++) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            if (!items[i].innerHTML.toLowerCase().includes(input)) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                items[i].style.display = "none";
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                items[i].style.display = "block";
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                                            function openPreview(src) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                                            	        document.getElementById('previewImg').src = src;
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                                            	                document.getElementById('imgModal').style.display = 'flex';
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                                            	                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                                            	                        function closePreview() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                                            	                        	        document.getElementById('imgModal').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                                            	                        	            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                                            	                        	            </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                                            	                        	            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                                            	                        	            </html>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                                            	                        	            
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                                            	                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            	                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            	                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        	            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                	                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            	                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            	                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                	                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                	                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        	                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        ]
