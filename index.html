<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Yizow Luxury | Premium Store</title>
                <style>
                        :root { --gold: #D4AF37; --dark: #0a0a0a; --white: #ffffff; }
                                body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: var(--white); margin: 0; overflow-x: hidden; }

                                                header { background: #111; padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
                                                        .promo-banner { background: var(--gold); color: black; text-align: center; padding: 8px; font-weight: bold; font-size: 14px; }

                                                                .search-container { padding: 15px; text-align: center; }
                                                                        #searchBar { width: 90%; max-width: 500px; padding: 12px; border-radius: 25px; border: 1px solid var(--gold); background: #111; color: white; outline: none; }

                                                                                .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
                                                                                        .item { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.3s; text-align: center; }
                                                                                                .item:hover { border-color: var(--gold); transform: translateY(-5px); }
                                                                                                        .item img { width: 100%; height: 220px; object-fit: cover; cursor: pointer; }

                                                                                                                        .price { color: var(--gold); font-weight: bold; font-size: 18px; display: block; padding: 5px; }
                                                                                                                                .btn-wa { background: #25D366; color: white; padding: 10px; text-decoration: none; display: block; margin: 10px; border-radius: 8px; font-weight: bold; font-size: 13px; }

                                                                                                                                        /* Notification Popup */
                                                                                                                                                .sales-notif {
                                                                                                                                                	            position: fixed; bottom: 20px; left: -350px; background: white; color: black;
                                                                                                                                                	                        padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 10px;
                                                                                                                                                	                                    z-index: 3000; transition: 0.8s ease-in-out; width: 260px; border-left: 5px solid var(--gold);
                                                                                                                                                	                                                box-shadow: 0 5px 15px rgba(0,0,0,0.5);
                                                                                                                                                	                                                        }
                                                                                                                                                	                                                                .sales-notif.show { left: 20px; }
                                                                                                                                                	                                                                        .sales-notif img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }

                                                                                                                                                	                                                                                footer { text-align: center; padding: 40px; color: #555; font-size: 12px; }
                                                                                                                                                	                                                                                    </style>
                                                                                                                                                	                                                                                    </head>
                                                                                                                                                	                                                                                    <body>

                                                                                                                                                	                                                                                        <div class="promo-banner" id="countdown">OFFA ITAISHA BAADA YA: 00:00:00</div>
                                                                                                                                                	                                                                                            <header><h1>YIZOW LUXURY</h1></header>

                                                                                                                                                	                                                                                                    <div class="search-container">
                                                                                                                                                	                                                                                                            <input type="text" id="searchBar" placeholder="Tafuta bidhaa unayotaka..." onkeyup="searchProduct()">
                                                                                                                                                	                                                                                                                </div>

                                                                                                                                                	                                                                                                                    <div class="grid" id="product-grid"></div>
                                                                                                                                                	                                                                                                                        <div id="sales-notification" class="sales-notif"></div>

                                                                                                                                                	                                                                                                                            <footer>&copy; 2026 Yizow Luxury Store | Arusha, Tanzania</footer>

                                                                                                                                                	                                                                                                                            <script>
                                                                                                                                                	                                                                                                                                const myNumber = "255693664088";

                                                                                                                                                	                                                                                                                                        // ORODHA YAKO KAMILI YA PICHA (32 total)
                                                                                                                                                	                                                                                                                                            const images = [
                                                                                                                                                	                                                                                                                                            	        'IMG-20260421-WA0003.jpg', 'IMG-20260421-WA0004.jpg', 'IMG-20260421-WA0044.jpg',
                                                                                                                                                	                                                                                                                                            	                'IMG-20260421-WA0045.jpg', 'IMG-20260426-WA0009.jpg', 'IMG-20260426-WA0010.jpg',
                                                                                                                                                	                                                                                                                                            	                        'IMG-20260426-WA0011.jpg', 'IMG-20260426-WA0012.jpg', 'IMG-20260426-WA0013.jpg',
                                                                                                                                                	                                                                                                                                            	                                'IMG-20260428-WA0028.jpg', 'IMG-20260428-WA0029.jpg', 'IMG-20260428-WA0030.jpg',
                                                                                                                                                	                                                                                                                                            	                                        'IMG-20260428-WA0031.jpg', 'IMG-20260429-WA0004.jpg', 'IMG-20260429-WA0005.jpg',
                                                                                                                                                	                                                                                                                                            	                                                'IMG-20260429-WA0006.jpg', 'IMG-20260429-WA0007.jpg', 'IMG-20260429-WA0008.jpg',
                                                                                                                                                	                                                                                                                                            	                                                        'IMG-20260429-WA0009.jpg', 'IMG-20260429-WA0010.jpg', 'IMG-20260429-WA0011.jpg',
                                                                                                                                                	                                                                                                                                            	                                                                'IMG-20260429-WA0012.jpg', 'IMG-20260429-WA0017.jpg', 'IMG-20260429-WA0018.jpg',
                                                                                                                                                	                                                                                                                                            	                                                                        'IMG-20260429-WA0019.jpg', 'IMG-20260429-WA0020.jpg', 'IMG-20260429-WA0021.jpg',
                                                                                                                                                	                                                                                                                                            	                                                                                'IMG-20260429-WA0022.jpg', 'IMG-20260429-WA0023.jpg', 'IMG-20260429-WA0049.jpg',
                                                                                                                                                	                                                                                                                                            	                                                                                        'IMG-20260429-WA0051.jpg', 'IMG-20260430-WA0023.jpg'
                                                                                                                                                	                                                                                                                                            	                                                                                            ];

                                                                                                                                                	                                                                                                                                            	                                                                                                const buyers = ["James", "Sarah", "Omary", "Neema", "Kelvin", "Aisha", "John", "Iddi"];
                                                                                                                                                	                                                                                                                                            	                                                                                                    const locations = ["Arusha", "Dar", "Mwanza", "Mbeya", "Dodoma", "Zanzibar", "Moshi"];

                                                                                                                                                	                                                                                                                                            	                                                                                                        function loadProducts() {
                                                                                                                                                	                                                                                                                                            	                                                                                                        	        const grid = document.getElementById('product-grid');
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                grid.innerHTML = images.map(img => `
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                            <div class="item">
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                            <img src="${img}" alt="Luxury Item" onerror="this.src='https://via.placeholder.com/200?text=Picha+Inapakia...'">
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                            <div class="details">
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                <span class="price">Tsh 45,000</span>
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                    <a href="https://wa.me/${myNumber}?text=Habari Yizow Luxury, nahitaji bidhaa hii: ${img}" class="btn-wa">AGIZA WHATSAPP</a>
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                    </div>
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                </div>
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                        `).join('');
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                            }

                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                function searchProduct() {
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	        let input = document.getElementById('searchBar').value.toLowerCase();
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                let items = document.getElementsByClassName('item');
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        for (let i = 0; i < items.length; i++) {
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            if (!images[i].toLowerCase().includes(input)) {
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                items[i].style.display = "none";
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            } else {
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                items[i].style.display = "block";
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                            }
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                    }
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                        }

                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            function showRandomSale() {
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	        const notif = document.getElementById('sales-notification');
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                const rName = buyers[Math.floor(Math.random() * buyers.length)];
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                        const rLoc = locations[Math.floor(Math.random() * locations.length)];
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                const rImg = images[Math.floor(Math.random() * images.length)];

                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                        notif.innerHTML = `
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                    <img src="${rImg}" onerror="this.src='https://via.placeholder.com/50'">
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                <div><b>${rName}</b> wa ${rLoc}<br>amenunua sasa hivi!</div>
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                        `;
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                notif.classList.add('show');
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                        setTimeout(() => { notif.classList.remove('show'); }, 5000);
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                            }

                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                function startTimer() {
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	        let time = 24 * 60 * 60; 
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                const display = document.getElementById('countdown');
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        setInterval(() => {
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	            let h = Math.floor(time / 3600);
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                        let m = Math.floor((time % 3600) / 60);
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                    let s = time % 60;
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                                display.innerHTML = `OFFA ITAISHA BAADA YA: ${h}h ${m}m ${s}s`;
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                                            time--;
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                                                    }, 1000);
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                                                        }

                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                                                            window.onload = () => {
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                                                            	        loadProducts();
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                                                            	                startTimer();
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                                                            	                        setInterval(showRandomSale, 15000);
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                                                            	                                setTimeout(showRandomSale, 4000);
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                                                            	                                    };
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                                                            	                                    </script>
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                                                            	                                    </body>
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                                                            	                                    </html>
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                                                            	                                    
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        	                                                                            }
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                	                        })
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            	                                                                                                }
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            	                                            }
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            	                            }
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        	            }
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                	                        }
                                                                                                                                                	                                                                                                                                            	                                                                                                        	                                                                                                                                                }
                                                                                                                                                	                                                                                                                                            	                                                                                                        }
                                                                                                                                                	                                                                                                                                            ]
                                                                                                                                                }
